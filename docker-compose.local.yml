services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: marketplace_development
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and background jobs
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Rails Backend API (Optional in local dev)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/rails
      - storage_data:/rails/storage
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgresql://marketplace:password@db:5432/marketplace_development
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev_secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles: ["full"]

  # Next.js Frontend (Optional in local dev)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    profiles: ["full"]

volumes:
  redis_data:
  postgres_data:
  storage_data:
