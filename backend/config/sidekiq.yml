# Sidekiq Configuration with Queue Priority Separation
# =====================================================
#
# Queue Priority Strategy:
# - critical (3): High-priority, time-sensitive operations
#   * Authentication-related jobs
#   * Payment processing
#   * Urgent system notifications
#
# - default (1): Standard business logic
#   * Booking/review notifications
#   * Email notifications
#   * Standard messaging
#
# - low (1): Background/batch jobs that can wait
#   * Vendor trust stats recalculation
#   * Analytics and reporting
#   * Cleanup tasks
#   * Portfolio image processing
#
# The numbers (3, 1, 1) represent relative concurrency allocation.
# With 3:1:1 ratio, critical gets 3x the processing power of default/low.
#
# Start Sidekiq with:
# bundle exec sidekiq -c 10 -q critical,3 -q default,1 -q low,1

---
# Development & Test Environments
:development:
  :max_retries: 5
  :timeout: 25
  :verbose: true
  :require: ./config/environment
  :pidfile: ./tmp/sidekiq.pid
  :logfile: ./log/sidekiq.log

:test:
  :max_retries: 0
  :timeout: 5
  :verbose: false
  :require: ./config/environment

# Production Environment
:production:
  :max_retries: 25
  :timeout: 25
  :verbose: false
  :require: ./config/environment
  :logfile: ./log/sidekiq.log
  :pidfile: ./tmp/sidekiq.pid
  :concurrency: 10
  :max_dead_jobs: 10000
  :dead_max_jobs: 10000

# Queue Definitions with Priority Weighting
:queues:
  # Critical: High-priority, time-sensitive
  # Weight 3 means this queue gets processed 3x more frequently
  - [critical, 3]

  # Default: Standard business logic
  # Weight 1
  - [default, 1]

  # Low: Background/batch jobs
  # Weight 1
  - [low, 1]

# Scheduled Job Processor (if using sidekiq-cron)
# :schedule:
#   booking_reminder:
#     cron: '0 * * * *'  # Every hour
#     class: BookingReminderJob
#     queue: low
